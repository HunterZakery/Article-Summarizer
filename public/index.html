<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Content Summarizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Smart Content Summarizer</h1>

        <textarea id="articleInput" placeholder="Place your Article here!"></textarea>

        <button id="summarizeBtn">Summarize</button>

        <div id="loading" class="hidden">⏳ Generating summary...</div>

        <div class="result-container">
            <h3>Summary</h3>
            <div id="result"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
